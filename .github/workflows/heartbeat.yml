name: heartbeat

on:
  schedule:
    # Cada 30 min. SIEMPRE UTC. Es el "despertador" de los recordatorios: revisa
    # la agenda y avisa día antes / inminente. GitHub puede retrasar el cron bajo
    # carga; la lógica usa umbrales (≤24h, ≤2h), no instantes, así que lo tolera.
    - cron: "*/30 * * * *"

  # El despertar instantáneo por correo urgente (Vercel → aquí).
  repository_dispatch:
    types: [wake]

  workflow_dispatch:

# Dos latidos a la vez escribirían las mismas notas del día y se pisarían.
concurrency:
  group: heartbeat
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  beat:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Dependencias del sistema
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libmagic1

      - name: Dependencias de Python
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Latir
        working-directory: backend
        env:
          HEARTBEAT_TRIGGER: ${{ github.event_name }}
          AGENT_NAME: U2NyaWJl
          LOGS_DIR: /tmp/logs
          QUARANTINE_DIR: /tmp/quarantine

          # Tareas e Issues: el token de Actions ya trae permiso de escritura.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AGENT_REPO_OWNER: ${{ github.repository_owner }}
          AGENT_REPO_NAME: ${{ github.event.repository.name }}

          # Bóveda
          VAULT_REPO_OWNER: ${{ secrets.VAULT_REPO_OWNER }}
          VAULT_REPO_NAME: ${{ secrets.VAULT_REPO_NAME }}
          VAULT_REPO_BRANCH: main
          VAULT_GITHUB_TOKEN: ${{ secrets.VAULT_GITHUB_TOKEN }}

          # Cerebro
          GITHUB_MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}

          # Google (Drive + Calendar)
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_ROOT_FOLDER_ID }}
          GOOGLE_CALENDAR_ID: primary

          # Correo
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          OWNER_EMAIL: ${{ secrets.OWNER_EMAIL }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}

          # Seguridad de archivos
          VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}

          # Firestore: espejo en vivo para el dashboard. Sin estas dos, el latido
          # procesa el correo y escribe la bóveda pero NUNCA refleja nada al panel.
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT_B64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_B64 }}

          # Unstructured (opcional): lectura amplia de documentos. Si el secret no existe,
          # la clave queda vacía y el pipeline usa solo los extractores locales.
          UNSTRUCTURED_API_KEY: ${{ secrets.UNSTRUCTURED_API_KEY }}
          UNSTRUCTURED_API_URL: ${{ secrets.UNSTRUCTURED_API_URL || 'https://api.unstructuredapp.io/general/v0/general' }}
        run: python -m app.agent.heartbeat
